name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint  # eslint --quiet (errors fail the build; warnings allowed)

  test:
    runs-on: ubuntu-latest
    needs: validate
    services:
      # No-auth Mongo on 27017 — the test harness (tests/setup.ts) connects
      # without credentials via TEST_MONGO_URL.
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          # tests/setup.ts reads TEST_MONGO_URL (no auth, db-per-suite)
          TEST_MONGO_URL: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-64-chars-minimum-for-ci-pipeline-testing-only!!
          REFRESH_TOKEN_SECRET: test-refresh-secret-64-chars-for-ci-pipeline-testing-only-too!!
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
