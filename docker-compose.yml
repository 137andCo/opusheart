# OpusHeart — local / single-box Docker Compose.
#
#   Datastores only (default):   docker compose up -d
#   Full stack (one command):    docker compose --profile app up -d --build
#
# The `app` profile builds and runs server + web + dashboard behind nginx on
# :80. It requires real secrets in .env (JWT_SECRET, ENCRYPTION_KEY, and a
# MONGO_ROOT_PASSWORD / REDIS_PASSWORD that are NOT the dev defaults) — the
# server refuses to boot in production with placeholder/dev credentials.
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:29017:27017"   # loopback-only — never exposed to the network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-opusheart}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}  # dev-only default; prod guard rejects it
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USERNAME:-opusheart}", "-p", "${MONGO_ROOT_PASSWORD:-devpassword}", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:29079:6379"   # loopback-only
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.17.0
    ports:
      - "127.0.0.1:29200:9200"   # loopback-only
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    profiles:
      - search

  # ── Application services (profile: app) ──────────────────────────────────
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: opusheart-server:local
    restart: unless-stopped
    profiles: [app]
    env_file: [.env]
    environment:
      NODE_ENV: production
      PORT: "3020"
      # Wire to the compose datastores using the same credentials. The server
      # refuses to boot if these still contain dev/placeholder passwords.
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-opusheart}:${MONGO_ROOT_PASSWORD:-devpassword}@mongo:27017/opusheart?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
      TRUST_PROXY: "1"
      # Optional Elasticsearch-backed search (run with --profile app,search). Unset = MongoDB search.
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3020/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    image: opusheart-web:local
    restart: unless-stopped
    profiles: [app]
    environment:
      NODE_ENV: production
      NITRO_PORT: "3022"
      NITRO_HOST: "0.0.0.0"
      NUXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost/api}
    depends_on: [server]

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    image: opusheart-dashboard:local
    restart: unless-stopped
    profiles: [app]
    depends_on: [server]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: [app]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [server, web, dashboard]

volumes:
  mongo-data:
  redis-data:
  es-data:
