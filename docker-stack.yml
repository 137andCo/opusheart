version: "3.8"

services:
  server:
    image: ${REGISTRY}/opusheart-server:${TAG:-latest}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
    secrets:
      - jwt_secret
      - encryption_key
      - mongo_uri
      - redis_url
    environment:
      NODE_ENV: production
      PORT: "3020"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3020/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - public

  web:
    image: ${REGISTRY}/opusheart-web:${TAG:-latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      NITRO_PORT: "3022"
      NITRO_HOST: "0.0.0.0"
      NUXT_PUBLIC_API_BASE: "https://${DOMAIN}/api"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3022/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - public

  dashboard:
    image: ${REGISTRY}/opusheart-dashboard:${TAG:-latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3021/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - public

  nginx:
    image: nginx:stable
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    networks:
      - public
    depends_on:
      - server
      - web
      - dashboard

  mongo:
    image: mongo:8
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.storage == true
    secrets:
      - mongo_root_username
      - mongo_root_password
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  redis:
    image: redis:7-bookworm
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.storage == true
    secrets:
      - redis_password
    command: sh -c 'redis-server --requirepass "$$(cat /run/secrets/redis_password)"'
    volumes:
      - redis-data:/data
    networks:
      - internal

secrets:
  jwt_secret:
    external: true
  encryption_key:
    external: true
  mongo_uri:
    external: true
  redis_url:
    external: true
  redis_password:
    external: true
  mongo_root_username:
    external: true
  mongo_root_password:
    external: true

volumes:
  mongo-data:
  redis-data:

networks:
  internal:
    driver: overlay
  public:
    driver: overlay
