apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: opusheart
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: opusheart
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # redis user in the official image
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-bookworm
          command: ["sh", "-c", "exec redis-server --requirepass \"$REDIS_PASSWORD\""]
          ports:
            - containerPort: 6379
          envFrom:
            - secretRef:
                name: opusheart-redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
