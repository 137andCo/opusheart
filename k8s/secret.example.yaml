# TEMPLATE — do NOT commit real secrets. Copy this to secret.yaml, replace each
# CHANGE_ME with a real value, apply it, and keep secret.yaml out of git (it is
# covered by k8s/.gitignore). Generate the 32-byte app secrets with:
#   openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: opusheart-secrets
  namespace: opusheart
type: Opaque
stringData:
  # 64 hex chars each (32 bytes)
  JWT_SECRET: "CHANGE_ME"
  ENCRYPTION_KEY: "CHANGE_ME"
  # Point at the in-cluster datastores (Services below). Use a strong password.
  MONGO_URI: "mongodb://opusheart:CHANGE_ME@mongo:27017/opusheart?authSource=admin"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: opusheart-mongo
  namespace: opusheart
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "opusheart"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: opusheart-redis
  namespace: opusheart
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME"
