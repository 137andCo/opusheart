# Replace `opusheart-server:0.1.0` with your pushed image, e.g.
# ghcr.io/<you>/opusheart-server:0.1.0 (pin a version/digest — never :latest).
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: opusheart
spec:
  selector:
    app: server
  ports:
    - port: 3020
      targetPort: 3020
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: opusheart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001          # appuser in the server Dockerfile
        fsGroup: 1001
      containers:
        - name: server
          image: opusheart-server:0.1.0
          ports:
            - containerPort: 3020
          envFrom:
            - configMapRef:
                name: opusheart-config
            - secretRef:
                name: opusheart-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /health, port: 3020 }
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: 3020 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
