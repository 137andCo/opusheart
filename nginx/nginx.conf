upstream api {
    server server:3020;
}

upstream web {
    server web:3022;
}

upstream dashboard {
    server dashboard:3021;
}

# ─────────────────────────────────────────────────────────────────────────────
# TLS: two supported topologies.
#
# (A) TLS terminated upstream (e.g. Traefik, a cloud LB, Cloudflare): leave the
#     plain `listen 80` server below as-is; the upstream forwards over the
#     internal network and sets X-Forwarded-Proto=https.
#
# (B) Terminate TLS here: uncomment the redirect + 443 server below, mount your
#     certs, and publish 443 in docker-stack.yml. Get certs via certbot/Let's
#     Encrypt or your CA.
#
# server {
#     listen 80;
#     server_name your.domain;
#     return 301 https://$host$request_uri;   # force HTTPS
# }
#
# server {
#     listen 443 ssl http2;
#     server_name your.domain;
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     # ... then duplicate the location blocks + security headers below ...
# }
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Security headers (applied to every response, incl. proxied SPA/SSR).
    # HSTS is commented out for topology (A) where the edge proxy should own it;
    # enable it here if you terminate TLS in this nginx (topology B).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API — proxy to Express server
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — Socket.IO
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Dashboard SPA
    location /dashboard/ {
        proxy_pass http://dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://api/api/health;
    }

    # Public website — catch-all
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
